<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Spotify Analytics</title>
    <link rel="stylesheet" href="spotify_data_analysis.css">
</head>
<body>

    <h1>Your Spotify Analytics</h1>

    <div id="uploadSection">
        <h2>Upload Spotify file</h2>
        <input type="file" id="fileInput" accept=".json,.zip">
        <button onclick="uploadFile()">Upload</button>
    </div>

    <div id="optionsSection" style="display:none;">
        <h2>Choose options</h2>

        <label for="mode">Mode:</label>
        <select id="mode">
            <option value="count">Count</option>
            <option value="time">Time</option>
        </select>

        <br><br>

        <label for="period">Period:</label>
        <select id="period">
            <option value="all">All time</option>
            <option value="4weeks">Last 4 weeks</option>
            <option value="3months">Last 3 months</option>
            <option value="6months">Last 6 months</option>
            <option value="1year">Last 1 year</option>
            <option value="thisyear">This year</option>
            <option value="lastyear">Last year</option>
        </select>

        <br><br>

        <button onclick="loadDashboard()">Show rankings</button>
    </div>
   
    <div id="generalstats" style="display:none;">
        <h2>General Statistics</h2>
        <div id="generalStatsContent"></div>
    </div>

    <div id="dashboardSection" style="display:none;">
        <h2>Top Rankings</h2>

        <div class="rankingBlock">
            <h3>Top Songs</h3>
            <div id="songsPreview"></div>
            <button onclick="goToRanking('song')">See full ranking</button>
       
        </div>

        <div class="rankingBlock">
            <h3>Top Artists</h3>
            <div id="artistsPreview"></div>
            <button onclick="goToRanking('artist')">See full ranking</button>
        </div>

        <div class="rankingBlock">
            <h3>Top Albums</h3>
            <div id="albumsPreview"></div>
            <button onclick="goToRanking('album')">See full ranking</button>
        </div>
    </div>
    

<script>
let songsData = [];
let artistsData = [];
let albumsData = [];

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("http://127.0.0.1:8000/upload", {
        method: "POST",
        body: formData
    });

    if (!response.ok) {
        alert("Upload failed");
        return;
    }

    document.getElementById("uploadSection").style.display = "none";
    document.getElementById("optionsSection").style.display = "block";
}

async function loadDashboard() {
    const mode = document.getElementById("mode").value;
    const period = document.getElementById("period").value;

    const songsResponse = await fetch(`http://127.0.0.1:8000/top-songs?mode=${mode}&period=${encodeURIComponent(period)}`);
    const artistsResponse = await fetch(`http://127.0.0.1:8000/top-artists?mode=${mode}&period=${encodeURIComponent(period)}`);
    const albumsResponse = await fetch(`http://127.0.0.1:8000/top-albums?mode=${mode}&period=${encodeURIComponent(period)}`);

    songsData = await songsResponse.json();
    artistsData = await artistsResponse.json();
    albumsData = await albumsResponse.json();

    displayRanking("songsPreview", songsData, mode, 10);
    displayRanking("artistsPreview", artistsData, mode, 10);
    displayRanking("albumsPreview", albumsData, mode, 10);

    document.getElementById("dashboardSection").style.display = "block";
}

function displayRanking(containerId, data, mode, limit) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    let label = "";
    if (mode === "count") {
        label = "streams";
    } else if (mode === "time") {
        label = "minutes";
    }
    let itemType = "";
    if (containerId.includes("songs")) itemType = "song";
    else if (containerId.includes("artists")) itemType = "artist";
    else if (containerId.includes("albums")) itemType = "album";

    data.slice(0, limit).forEach((item, index) => {
        const value = item[1];
        let name = "";
        let artist = null;

        if (Array.isArray(item[0])) {
            name = item[0][0];
            artist = item[0][1];
        } else {
            name = item[0];
        }

        const div = document.createElement("div");
        div.className = "rankingRow";
        div.style.cursor = "pointer";
        div.textContent = `${index + 1}. ${artist ? name + " - " + artist : name} : ${value} ${label}`;

        div.onclick = () => {
            const mode = document.getElementById("mode").value;
            // On utilise itemType qu'on a défini plus haut
            let url = `item.html?type=${itemType}&name=${encodeURIComponent(name)}&mode=${mode}`;
            if (artist) url += `&artist=${encodeURIComponent(artist)}`;
            window.location.href = url;
        };

        container.appendChild(div);
    });
}
    data.slice(0, limit).forEach((item, index) => {
    const value = item[1];
    let name = "";
    let artist = null;

    if (Array.isArray(item[0])) {
        name = item[0][0];
        artist = item[0][1];
    } else {
        name = item[0];
    }

    const div = document.createElement("div");
    div.className = "rankingRow";
    div.style.cursor = "pointer"; // Indique que c'est cliquable
    div.textContent = `${index + 1}. ${artist ? name + " - " + artist : name} : ${value} ${label}`;


    div.onclick = () => {
        const mode = document.getElementById("mode").value;
        
        let itemType = containerId.includes("Songs") ? "song" : 
                       containerId.includes("Artists") ? "artist" : "album";
        
        let url = `item.html?type=${itemType}&name=${encodeURIComponent(name)}&mode=${mode}`;
        if (artist) url += `&artist=${encodeURIComponent(artist)}`;
        
        window.location.href = url;
    };

    container.appendChild(div);


    });

function openRankingModal(type) {
    const mode = document.getElementById("mode").value;

    let title = "";
    let data = [];

    if (type === "songs") {
        title = "Full Songs Ranking";
        data = songsData;
    } else if (type === "artists") {
        title = "Full Artists Ranking";
        data = artistsData;
    } else if (type === "albums") {
        title = "Full Albums Ranking";
        data = albumsData;
    }

    document.getElementById("modalTitle").textContent = title;
    displayModalRanking(data, mode);

    document.getElementById("rankingModal").style.display = "flex";
}

function displayModalRanking(data, mode) {
    const container = document.getElementById("modalResults");
    container.innerHTML = "";

    let label = "";
    if (mode === "count") {
        label = "streams";
    } else if (mode === "time") {
        label = "minutes";
    }

}

function goToRanking(type) {
    const mode = document.getElementById("mode").value;
    const period = document.getElementById("period").value;

    window.location.href = `ranking.html?type=${type}&mode=${mode}&period=${encodeURIComponent(period)}`;
}

function generalStats() {
    fetch("http://localhost:8000/general-stats")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("generalStatsContent");
            container.innerHTML = `
                <p>Total songs listened: ${data.total_songs}</p>
                <p>Total artists listened: ${data.total_artists}</p>
                <p>Total albums listened: ${data.total_albums}</p>
                <p>Date of first listening: ${data.date_of_first_listening}</p>
                <p>Date of last listening: ${data.date_of_last_listening}</p>
                <p>Average listening per day: ${data.listening_per_day.toFixed(2)} minutes</p>
                <p>Average listening per year: ${data.listening_per_year.toFixed(2)} minutes</p>
            `;

            // Afficher les écoutes par année
            const yearlyStats = document.createElement("div");
            yearlyStats.innerHTML = "<h3>Listenings for each year:</h3>";
            const list = document.createElement("ul");
            for (const [year, count] of Object.entries(data.listenings_for_each_year)) {
                const listItem = document.createElement("li");
                listItem.textContent = `${year}: ${count} minutes`;
                list.appendChild(listItem);
            }
            yearlyStats.appendChild(list);
            container.appendChild(yearlyStats);
        })
        .catch(error => {
            console.error("Error fetching general stats:", error);
        });

    }
    
</script>

</body>
</html>
