
<!DOCTYPE html>
<html>
<head>
    <title>Music Analytics</title>
</head>
<body>

<h1>Music Analytics</h1>

<!-- Upload the file -->
<div id="uploadSection">
    <h2>Upload Spotify JSON</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
</div>

<!--Choose the ranking-->
<div id="optionsSection" style="display:none;">
    <h2>Choose Ranking</h2>

    <label>Type:</label>
    <select id="type">
        <option value="song">Songs</option>
        <option value="artist">Artists</option>
        <option value="album">Albums</option>
    </select>

    <br><br>

    <label>Mode:</label>
    <select id="mode">
        <option value="count">Count</option>
        <option value="time">Time</option>
    </select>

    <br><br>

    <button onclick="getRanking()">Show Ranking</button>
</div>

<!-- Results -->
<div id="resultSection" style="display:none;">
    <h2>Top 100</h2>
    <div id="results"></div>
</div>


<script>

//  Upload file
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    await fetch("http://127.0.0.1:8000/upload", {
        method: "POST",
        body: formData
    });

    // Move to next step
    document.getElementById("uploadSection").style.display = "none";
    document.getElementById("optionsSection").style.display = "block";
}

// Get ranking
async function getRanking() {
    const type = document.getElementById("type").value;
    const mode = document.getElementById("mode").value;

    let endpoint = "";

    if (type === "song") endpoint = "top-songs";
    if (type === "artist") endpoint = "top-artists";
    if (type === "album") endpoint = "top-albums";

    const response = await fetch(
        `http://127.0.0.1:8000/${endpoint}?mode=${mode}`
    );

    const data = await response.json();

    displayResults(data, mode);

    document.getElementById("resultSection").style.display = "block";
}

// Display results
function displayResults(data, mode) {
    const container = document.getElementById("results");
    container.innerHTML = ""
    data.slice(0, 100).forEach((item, index) => {
        let name = "";
        let value =item[1];
        let label = "";
        

        if (mode === "count"){
            label = "streams"
        }

        if (mode === "time"){
            label ="minutes"
        }

        if (Array.isArray(item[0])) {
            name = item[0].join(" - ");
        } else {
            name = item[0];
        }

        const div = document.createElement("div");
        div.textContent = `${index + 1}. ${name} : ${value} ${label}`;
        container.appendChild(div);
    });
}

</script>

</body>
</html>
